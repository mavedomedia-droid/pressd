<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
<meta name="theme-color" content="#643C3C" />
<title>Pressd · Laundry</title>
<meta name="robots" content="noindex,nofollow" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">

<style>
  :root {
    --brand-primary: #643C3C;
    --brand-primary-deep: #4D2E2E;
    --brand-accent: #D2E6B4;
    --brand-cream: #FAF6EE;
    --brand-cream-deep: #F2EBDC;
    --brand-ink: #2A1F1F;
    --brand-muted: #7C6A6A;
    --brand-line: #E8DFD4;
    --brand-success: #5A8C3F;
    --brand-success-bg: #ECF5DD;
    --brand-warning: #B97B0E;
    --brand-warning-bg: #FEF6E7;
    --brand-danger: #C44545;
    --brand-danger-bg: #FCEEEE;
    --brand-info: #3F6F99;
    --brand-info-bg: #E3EEF6;

    --font-display: 'Sora', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-editorial: 'Fraunces', Georgia, serif;
    --font-mono: ui-monospace, 'SF Mono', Menlo, monospace;

    --r-sm: 8px; --r-md: 14px; --r-lg: 20px; --r-pill: 999px;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0; min-height: 100vh;
    font-family: var(--font-display);
    font-size: 15px; line-height: 1.5;
    color: var(--brand-ink);
    background: var(--brand-cream);
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  input, select, textarea { font-family: inherit; font-size: inherit; }

  .topbar {
    background: var(--brand-primary); color: var(--brand-accent);
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .topbar-brand {
    font-family: var(--font-display); font-weight: 600;
    font-size: 17px; letter-spacing: -0.01em;
  }
  .topbar-brand em { font-family: var(--font-editorial); font-style: italic; font-weight: 400; opacity: .85; }
  .topbar-actions { display: flex; align-items: center; gap: 10px; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(210,230,180,0.15); color: var(--brand-accent);
    display: grid; place-items: center;
    transition: background .15s;
  }
  .icon-btn:hover { background: rgba(210,230,180,0.25); }

  .gate {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px; background: var(--brand-cream);
  }
  .gate-card {
    background: #fff; border: 1px solid var(--brand-line);
    border-radius: var(--r-lg); padding: 40px 28px;
    max-width: 380px; width: 100%;
    box-shadow: 0 8px 32px rgba(100,60,60,0.06);
  }
  .gate-card h1 {
    font-family: var(--font-display); font-weight: 600;
    font-size: 26px; margin: 0 0 4px;
    color: var(--brand-primary); letter-spacing: -0.02em;
  }
  .gate-card h1 em { font-family: var(--font-editorial); font-style: italic; font-weight: 400; }
  .gate-sub { color: var(--brand-muted); font-size: 14px; margin: 0 0 24px; }
  .gate input {
    width: 100%; padding: 14px 16px;
    border: 1.5px solid var(--brand-line);
    border-radius: var(--r-md); background: #fff;
    color: var(--brand-ink); margin-bottom: 12px;
  }
  .gate input:focus { outline: none; border-color: var(--brand-primary); box-shadow: 0 0 0 4px rgba(100,60,60,0.08); }
  .gate button {
    width: 100%; padding: 14px;
    background: var(--brand-primary); color: var(--brand-accent);
    border-radius: var(--r-pill); font-weight: 600; font-size: 15px;
    transition: background .15s;
  }
  .gate button:hover:not(:disabled) { background: var(--brand-primary-deep); }
  .gate button:disabled { opacity: .5; cursor: not-allowed; }
  .gate-error { color: var(--brand-danger); font-size: 13px; margin-top: 12px; min-height: 18px; }

  .app { padding: 16px; max-width: 720px; margin: 0 auto; }
  .page-head { margin-bottom: 16px; }
  .page-head h2 {
    font-family: var(--font-display); font-weight: 600;
    font-size: 24px; letter-spacing: -0.02em;
    color: var(--brand-primary); margin: 0 0 4px;
  }
  .page-head h2 em { font-family: var(--font-editorial); font-style: italic; font-weight: 400; }
  .page-head p { margin: 0; color: var(--brand-muted); font-size: 14px; }

  .filter-bar {
    display: flex; align-items: center; gap: 8px;
    overflow-x: auto;
    padding-bottom: 6px;
    margin-bottom: 16px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-pill {
    flex-shrink: 0;
    font-size: 13px; padding: 8px 14px;
    background: #fff; border: 1px solid var(--brand-line);
    color: var(--brand-ink); border-radius: var(--r-pill);
    font-weight: 500;
    transition: all .15s;
    white-space: nowrap;
  }
  .filter-pill:hover { border-color: var(--brand-primary); }
  .filter-pill.active {
    background: var(--brand-primary); color: var(--brand-accent);
    border-color: var(--brand-primary); font-weight: 600;
  }
  .filter-pill .count {
    opacity: .7; margin-left: 4px; font-weight: 500;
  }
  .filter-pill.active .count { opacity: .85; }

  .order-list { display: flex; flex-direction: column; gap: 10px; }
  .order-card {
    background: #fff; border: 1px solid var(--brand-line);
    border-radius: var(--r-lg); padding: 16px 18px;
    transition: border-color .2s ease;
  }
  .order-card.expanded { border-color: var(--brand-primary); }
  .order-head {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 12px; cursor: pointer;
  }
  .order-head.no-toggle { cursor: default; }
  .order-id {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--brand-muted); margin-bottom: 4px;
    letter-spacing: 0.02em;
  }
  .order-name {
    font-family: var(--font-display); font-weight: 600;
    font-size: 18px; color: var(--brand-primary);
    letter-spacing: -0.01em; line-height: 1.2;
  }
  .order-meta { font-size: 13px; color: var(--brand-muted); margin-top: 4px; }
  .order-toggle {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--brand-cream-deep);
    color: var(--brand-primary);
    display: grid; place-items: center;
    transition: transform .25s ease, background .2s ease;
    flex-shrink: 0;
  }
  .order-card.expanded .order-toggle {
    background: var(--brand-accent);
    transform: rotate(180deg);
  }

  .tags-row {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-top: 12px;
  }
  .tag {
    display: inline-flex; align-items: center;
    font-size: 11px; padding: 5px 10px;
    border-radius: var(--r-pill); font-weight: 600;
    letter-spacing: 0.04em; text-transform: uppercase;
    line-height: 1.2;
  }
  .tag-service {
    background: var(--brand-cream-deep);
    color: var(--brand-primary);
  }
  .tag-status-new {
    background: var(--brand-primary);
    color: var(--brand-accent);
  }
  .tag-status-pending {
    background: var(--brand-cream-deep);
    color: var(--brand-muted);
    text-transform: none;
    letter-spacing: 0.02em;
  }
  .tag-status-payment {
    background: var(--brand-warning-bg);
    color: var(--brand-warning);
  }
  .tag-status-paid {
    background: var(--brand-success-bg);
    color: var(--brand-success);
  }
  .tag-status-coming {
    background: var(--brand-info-bg);
    color: var(--brand-info);
    text-transform: none;
    letter-spacing: 0.02em;
  }

  .order-detail {
    padding-top: 14px; margin-top: 12px;
    border-top: 1px solid var(--brand-line);
  }
  .detail-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 12px; padding: 6px 0; font-size: 14px;
  }
  .detail-row .key { color: var(--brand-muted); flex-shrink: 0; }
  .detail-row .val { color: var(--brand-ink); font-weight: 500; text-align: right; word-break: break-word; }

  .notes-block {
    background: var(--brand-cream-deep);
    border-radius: var(--r-sm);
    padding: 10px 12px; margin: 10px 0;
    font-size: 13px; color: var(--brand-ink);
    white-space: pre-wrap; line-height: 1.5;
  }
  .notes-block .notes-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--brand-muted); font-weight: 600; margin-bottom: 4px;
  }

  .cost-input-block {
    background: var(--brand-cream); border: 1.5px solid var(--brand-line);
    border-radius: var(--r-md); padding: 14px;
    margin-top: 14px;
  }
  .cost-input-label {
    font-size: 12px; font-weight: 600;
    color: var(--brand-primary);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 8px;
  }
  .cost-input-wrap {
    display: flex; align-items: center;
    background: #fff; border: 1.5px solid var(--brand-line);
    border-radius: var(--r-md); overflow: hidden;
    transition: border-color .15s;
  }
  .cost-input-wrap:focus-within { border-color: var(--brand-primary); }
  .cost-input-wrap .currency {
    padding: 14px 4px 14px 14px;
    font-family: var(--font-display); font-weight: 600;
    color: var(--brand-muted); font-size: 18px;
  }
  .cost-input-wrap input {
    flex: 1; padding: 14px 14px 14px 4px;
    border: none; outline: none; background: transparent;
    font-family: var(--font-display); font-weight: 600;
    font-size: 18px; color: var(--brand-ink);
    -moz-appearance: textfield;
  }
  .cost-input-wrap input::-webkit-outer-spin-button,
  .cost-input-wrap input::-webkit-inner-spin-button {
    -webkit-appearance: none; margin: 0;
  }
  .notes-textarea {
    width: 100%;
    margin-top: 10px;
    padding: 12px 14px;
    border: 1.5px solid var(--brand-line);
    border-radius: var(--r-md); background: #fff;
    font-size: 14px; color: var(--brand-ink);
    line-height: 1.5; resize: vertical;
    min-height: 60px;
  }
  .notes-textarea:focus { outline: none; border-color: var(--brand-primary); }

  .submit-btn {
    width: 100%; margin-top: 12px;
    padding: 14px;
    background: var(--brand-primary); color: var(--brand-accent);
    border-radius: var(--r-pill);
    font-weight: 600; font-size: 15px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background .15s, opacity .15s;
  }
  .submit-btn:hover:not(:disabled) { background: var(--brand-primary-deep); }
  .submit-btn:disabled { opacity: .5; cursor: not-allowed; }

  .ready-btn {
    width: 100%; margin-top: 12px;
    padding: 14px;
    background: var(--brand-success); color: #fff;
    border-radius: var(--r-pill);
    font-weight: 600; font-size: 15px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background .15s, opacity .15s;
  }
  .ready-btn:hover:not(:disabled) { background: #4a7332; }
  .ready-btn:disabled { opacity: .5; cursor: not-allowed; }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(120%);
    background: var(--brand-primary); color: var(--brand-accent);
    padding: 14px 22px; border-radius: var(--r-pill);
    font-size: 14px; font-weight: 500;
    box-shadow: 0 12px 32px rgba(100,60,60,0.25);
    opacity: 0;
    transition: transform .25s, opacity .25s;
    z-index: 100; pointer-events: none;
    max-width: 90vw;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.error { background: var(--brand-danger); color: #fff; }
  .toast.success { background: var(--brand-success); color: #fff; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid currentColor; border-top-color: transparent;
    border-radius: 50%; animation: spin .8s linear infinite;
    display: inline-block; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-state { padding: 60px; text-align: center; color: var(--brand-muted); }

  .empty-state {
    background: #fff; border: 1px solid var(--brand-line);
    border-radius: var(--r-lg); padding: 60px 24px;
    text-align: center;
  }
  .empty-icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--brand-success-bg); color: var(--brand-success);
    display: grid; place-items: center;
    margin: 0 auto 16px;
  }
  .empty-state h3 {
    font-family: var(--font-display); font-weight: 600;
    font-size: 18px; color: var(--brand-primary); margin: 0 0 6px;
  }
  .empty-state p { margin: 0; color: var(--brand-muted); font-size: 14px; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="gate-card">
    <h1>Pressd <em>laundry</em></h1>
    <p class="gate-sub">Enter your passcode to see your queue.</p>
    <input type="password" id="passcode-input" placeholder="Passcode" autocomplete="off" autofocus />
    <button id="login-btn">Continue</button>
    <div class="gate-error" id="gate-error"></div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="topbar">
    <div class="topbar-brand">Pressd <em>laundry</em></div>
    <div class="topbar-actions">
      <button class="icon-btn" id="refresh-btn" aria-label="Refresh">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
      </button>
      <button class="icon-btn" id="logout-btn" aria-label="Log out">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>

  <div class="app">
    <div class="page-head">
      <h2>Your <em>orders</em></h2>
      <p id="page-sub">Loading…</p>
    </div>

    <div class="filter-bar" id="filter-bar"></div>

    <div id="queue-wrap">
      <div class="loading-state"><span class="spinner"></span> Loading orders…</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="pressd-config.js"></script>
<script>
  const APPS_SCRIPT_URL = (window.PRESSD_CONFIG && window.PRESSD_CONFIG.APPS_SCRIPT_URL) || '';
  const STORAGE_KEY = 'pressd_laundry_passcode';

  const $ = (s, c = document) => c.querySelector(s);
  const $$ = (s, c = document) => Array.from(c.querySelectorAll(s));

  let passcode = sessionStorage.getItem(STORAGE_KEY) || '';
  let allOrders = [];
  let activeFilter = 'all';   // FIX: default to 'all' so the laundry guy sees everything sorted by urgency
  let expandedId = null;

  /* Bucket priority — sort order in the 'all' view, lower = more urgent */
  const BUCKET_PRIORITY = {
    new:     0,  // awaiting cost entry — most urgent action
    paid:    1,  // fully paid, mark ready as soon as wash is done
    payment: 2,  // cost submitted, waiting on customer payment — laundry can keep working
    washing: 3,  // admin reviewing or customer paying — passive
    coming:  4,  // future pickups — heads-up only
  };

  const FILTERS = [
    { key: 'all',     label: 'All' },
    { key: 'new',     label: 'New orders' },
    { key: 'paid',    label: 'Paid · ready to mark' },
    { key: 'payment', label: 'Awaiting payment' },
    { key: 'washing', label: 'Currently washing' },
    { key: 'coming',  label: 'Coming up' },
  ];

  function showGate() {
    $('#gate').classList.remove('hidden');
    $('#app').classList.add('hidden');
    setTimeout(() => $('#passcode-input').focus(), 100);
  }
  function showApp() {
    $('#gate').classList.add('hidden');
    $('#app').classList.remove('hidden');
    loadQueue();
  }

  async function tryLogin(code) {
    try {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'laundryLogin', passcode: code }),
      });
      const data = await res.json();
      return !!(data && data.ok);
    } catch (err) { console.error(err); return false; }
  }

  $('#login-btn').addEventListener('click', async () => {
    const code = $('#passcode-input').value.trim();
    if (!code) { $('#gate-error').textContent = 'Enter a passcode.'; return; }
    const btn = $('#login-btn');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
    const ok = await tryLogin(code);
    btn.disabled = false; btn.textContent = 'Continue';
    if (ok) {
      passcode = code;
      sessionStorage.setItem(STORAGE_KEY, code);
      $('#gate-error').textContent = '';
      showApp();
    } else {
      $('#gate-error').textContent = 'Wrong passcode. Try again.';
      $('#passcode-input').select();
    }
  });

  $('#passcode-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') $('#login-btn').click();
  });

  $('#logout-btn').addEventListener('click', () => {
    passcode = '';
    sessionStorage.removeItem(STORAGE_KEY);
    $('#passcode-input').value = '';
    showGate();
  });

  async function callBackend(action, extra = {}) {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(Object.assign({ action: action, passcode: passcode }, extra)),
    });
    const data = await res.json();
    if (data && data.error && /Invalid passcode/i.test(data.error)) {
      passcode = '';
      sessionStorage.removeItem(STORAGE_KEY);
      showGate();
      throw new Error('Session expired');
    }
    if (data && data.ok === false) throw new Error(data.error || 'Request failed');
    return data;
  }

  function fmtNaira(n) {
    if (n == null || isNaN(n) || n === '') return '—';
    return '₦' + Math.round(Number(n)).toLocaleString('en-NG');
  }
  function fmtDate(iso) {
    if (!iso) return '—';
    try {
      const d = new Date(iso);
      if (isNaN(d.getTime())) return '—';
      return d.toLocaleString('en-NG', { weekday: 'short', day: 'numeric', month: 'short' });
    } catch (e) { return '—'; }
  }
  function fmtZone(z) { return ({ mainland: 'Mainland', island: 'Island' })[z] || (z || ''); }
  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function classifyOrder(o) {
    if (o.orderReadyAt || o.outForDeliveryAt || o.deliveryStatus === 'delivered') return null;
    const pickupStatus = (o.pickupStatus || '').toLowerCase();
    const costStatus = (o.costStatus || '').toLowerCase();

    if (pickupStatus === 'pickup_paid' || pickupStatus === 'pickup_scheduled' || pickupStatus === 'scheduled') {
      return 'coming';
    }
    if (pickupStatus === 'picked_up' && (!costStatus || costStatus === 'not_submitted')) {
      return 'new';
    }
    if (o.invoiceStatus === 'paid_in_full') return 'paid';
    if (o.invoiceStatus === 'balance_due' && o.secondPaymentStatus === 'paid') return 'paid';
    if (o.invoiceStatus === 'balance_due') return 'payment';
    if (costStatus === 'pending_review' || costStatus === 'confirmed') return 'washing';
    return null;
  }

  function serviceTagFor(o) {
    if (o.pickupOnly) {
      return { label: 'Wash + Iron · estimate', cls: 'tag-service' };
    }
    if (o.loadEnabled && o.careEnabled) {
      const n = o.loads || 1;
      return { label: `${n} load + ${fmtNaira(o.careTabPrepaid)} care tab`, cls: 'tag-service' };
    }
    if (o.loadEnabled) {
      const n = o.loads || 1;
      return { label: `Wash + Fold · ${n} load${n > 1 ? 's' : ''}`, cls: 'tag-service' };
    }
    if (o.careEnabled) {
      return { label: `Wash + Iron · ${fmtNaira(o.careTabPrepaid)} tab`, cls: 'tag-service' };
    }
    return { label: 'Mixed laundry', cls: 'tag-service' };
  }

  function statusTagFor(o, bucket) {
    switch (bucket) {
      case 'new':
        return { label: 'New order', cls: 'tag-status-new' };
      case 'washing':
        return { label: o.costStatus === 'pending_review' ? 'Price pending admin' : 'Currently washing', cls: 'tag-status-pending' };
      case 'payment':
        return { label: 'Awaiting payment', cls: 'tag-status-payment' };
      case 'paid':
        return { label: 'Paid · mark ready', cls: 'tag-status-paid' };
      case 'coming':
        return { label: o.pickupScheduledFor ? ('Scheduled · ' + fmtDate(o.pickupScheduledFor)) : 'Coming up', cls: 'tag-status-coming' };
      default:
        return { label: '—', cls: 'tag-status-pending' };
    }
  }

  async function loadQueue() {
    try {
      const data = await callBackend('getLaundryQueue');
      const q = data.queue || { headsUp: [], active: [], inProgress: [] };
      allOrders = [...q.active, ...q.inProgress, ...q.headsUp];
      renderFilters();
      renderQueue();
      updateSubtitle();
    } catch (err) {
      $('#queue-wrap').innerHTML = `
        <div class="empty-state">
          <h3>Couldn't load orders</h3>
          <p>${escapeHtml(err.message || 'Try again in a moment.')}</p>
        </div>
      `;
    }
  }

  function countsByBucket() {
    const counts = { new: 0, washing: 0, payment: 0, paid: 0, coming: 0, all: 0 };
    allOrders.forEach(o => {
      const b = classifyOrder(o);
      if (b && counts[b] != null) counts[b]++;
      if (b) counts.all++;
    });
    return counts;
  }

  function renderFilters() {
    const counts = countsByBucket();
    const bar = $('#filter-bar');
    bar.innerHTML = FILTERS.map(f => {
      const isActive = activeFilter === f.key;
      const count = counts[f.key] || 0;
      return `
        <button class="filter-pill ${isActive ? 'active' : ''}" data-filter="${f.key}">
          ${escapeHtml(f.label)} <span class="count">${count}</span>
        </button>
      `;
    }).join('');
    $$('.filter-pill', bar).forEach(p => {
      p.addEventListener('click', () => {
        activeFilter = p.dataset.filter;
        renderFilters();
        renderQueue();
        updateSubtitle();
      });
    });
  }

  function updateSubtitle() {
    const total = allOrders.length;
    if (total === 0) {
      $('#page-sub').textContent = 'Nothing in your queue right now.';
      return;
    }
    const counts = countsByBucket();
    const activeLabel = (FILTERS.find(f => f.key === activeFilter) || {}).label || 'All';
    const activeCount = counts[activeFilter] || 0;
    if (activeFilter === 'all') {
      $('#page-sub').textContent = `${total} order${total === 1 ? '' : 's'} · most urgent first`;
    } else {
      $('#page-sub').textContent = `${activeLabel} · ${activeCount} of ${total} total`;
    }
  }

  function renderQueue() {
    const wrap = $('#queue-wrap');
    let visible = allOrders
      .map(o => ({ order: o, bucket: classifyOrder(o) }))
      .filter(x => {
        if (!x.bucket) return false;
        if (activeFilter === 'all') return true;
        return x.bucket === activeFilter;
      });

    /* FIX: sort 'all' view by bucket priority so urgent work bubbles to top */
    if (activeFilter === 'all') {
      visible.sort((a, b) => {
        const pa = BUCKET_PRIORITY[a.bucket] ?? 99;
        const pb = BUCKET_PRIORITY[b.bucket] ?? 99;
        if (pa !== pb) return pa - pb;
        return 0;  // same bucket: keep backend's order (oldest pickup first)
      });
    }

    if (visible.length === 0) {
      const emptyMessages = {
        new:     { h: 'No new orders', p: 'When pickups arrive at the laundry, they show up here.' },
        washing: { h: 'Nothing washing', p: 'Orders you\'ve submitted cost on appear here while admin reviews and customers pay.' },
        payment: { h: 'No pending payments', p: 'Orders waiting for the customer to settle their balance show up here.' },
        paid:    { h: 'Nothing to mark ready', p: 'Once a customer\'s laundry is paid for and washed, you can mark it ready here.' },
        coming:  { h: 'Nothing coming up', p: 'Future pickups appear here as a heads-up.' },
        all:     { h: 'All caught up', p: 'No orders in your queue right now.' },
      };
      const msg = emptyMessages[activeFilter] || emptyMessages.all;
      wrap.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <h3>${escapeHtml(msg.h)}</h3>
          <p>${escapeHtml(msg.p)}</p>
        </div>
      `;
      return;
    }

    wrap.innerHTML = '<div class="order-list">' + visible.map(x => orderCardHtml(x.order)).join('') + '</div>';

    $$('.order-head[data-order-id]').forEach(h => {
      if (h.classList.contains('no-toggle')) return;
      h.addEventListener('click', () => toggleCard(h.dataset.orderId));
    });
    $$('.cost-form').forEach(f => {
      f.addEventListener('submit', e => {
        e.preventDefault();
        submitCost(f.dataset.orderId, f);
      });
    });
    $$('.ready-btn-trigger').forEach(b => {
      b.addEventListener('click', () => markReady(b.dataset.orderId));
    });
  }

  function toggleCard(orderId) {
    expandedId = (expandedId === orderId) ? null : orderId;
    renderQueue();
    if (expandedId) {
      const card = document.querySelector(`.order-card[data-order-id="${CSS.escape(expandedId)}"]`);
      if (card) {
        setTimeout(() => {
          const input = card.querySelector('input[type="number"]');
          if (input) input.focus();
        }, 50);
      }
    }
  }

  function orderCardHtml(o) {
    const bucket = classifyOrder(o);
    const isExpanded = expandedId === o.orderId;
    const serviceTag = serviceTagFor(o);
    const statusTag = statusTagFor(o, bucket);
    const canExpand = bucket !== 'coming';

    const area = (fmtZone(o.zone) + (o.area ? ', ' + o.area : '')) || '—';
    const metaLine = (bucket === 'coming' || !o.pickupDate) ? area : (fmtDate(o.pickupDate) + ' · ' + area);

    const detailHtml = isExpanded ? expandedDetail(o, bucket) : '';

    return `
      <div class="order-card${isExpanded ? ' expanded' : ''}" data-order-id="${escapeHtml(o.orderId)}">
        <div class="order-head${canExpand ? '' : ' no-toggle'}" data-order-id="${escapeHtml(o.orderId)}">
          <div>
            <div class="order-id">${escapeHtml(o.orderId)}</div>
            <div class="order-name">${escapeHtml(o.firstName || '—')}</div>
            <div class="order-meta">${escapeHtml(metaLine)}</div>
          </div>
          ${canExpand ? `
          <div class="order-toggle">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </div>` : ''}
        </div>
        <div class="tags-row">
          <span class="tag ${serviceTag.cls}">${escapeHtml(serviceTag.label)}</span>
          <span class="tag ${statusTag.cls}">${escapeHtml(statusTag.label)}</span>
        </div>
        ${detailHtml}
      </div>
    `;
  }

  function expandedDetail(o, bucket) {
    if (bucket === 'new') return newOrderDetail(o);
    if (bucket === 'washing') return washingDetail(o);
    if (bucket === 'payment') return paymentDetail(o);
    if (bucket === 'paid') return paidDetail(o);
    return '';
  }

  function newOrderDetail(o) {
    const summary = describeWhatWasOrdered(o);
    const notes = (o.pickupNotes && o.pickupNotes.trim())
      ? `<div class="notes-block"><div class="notes-label">Pickup notes</div>${escapeHtml(o.pickupNotes)}</div>`
      : '';
    return `
      <div class="order-detail">
        <div class="detail-row"><span class="key">Picked up</span><span class="val">${fmtDate(o.pickupDate)}</span></div>
        <div class="detail-row"><span class="key">What was ordered</span><span class="val">${escapeHtml(summary)}</span></div>
        ${notes}
        <form class="cost-form" data-order-id="${escapeHtml(o.orderId)}" autocomplete="off">
          <div class="cost-input-block">
            <div class="cost-input-label">Final laundry cost</div>
            <div class="cost-input-wrap">
              <span class="currency">₦</span>
              <input type="number" name="finalCost" min="0" step="500" placeholder="0" inputmode="numeric" value="${o.finalLaundryCost > 0 ? o.finalLaundryCost : ''}" required />
            </div>
            <textarea name="laundryNote" class="notes-textarea" placeholder="Notes for admin (optional) — heavy stains, missing items, special handling…" rows="2"></textarea>
          </div>
          <button type="submit" class="submit-btn">
            <span class="btn-label">Send to admin for review</span>
          </button>
        </form>
      </div>
    `;
  }

  function washingDetail(o) {
    return `
      <div class="order-detail">
        <div class="detail-row"><span class="key">Picked up</span><span class="val">${fmtDate(o.pickupDate)}</span></div>
        <div class="detail-row"><span class="key">Cost submitted</span><span class="val">${fmtNaira(o.finalLaundryCost)}</span></div>
        ${o.laundryNote ? `<div class="notes-block"><div class="notes-label">Your note to admin</div>${escapeHtml(o.laundryNote)}</div>` : ''}
        <p style="font-size:13px; color:var(--brand-muted); margin:14px 0 0; text-align:center;">
          ${o.costStatus === 'pending_review' ? 'Admin is reviewing your submission.' : 'Customer has been invoiced. Keep working — you can mark ready as soon as the laundry is done.'}
        </p>
      </div>
    `;
  }

  function paymentDetail(o) {
    return `
      <div class="order-detail">
        <div class="detail-row"><span class="key">Picked up</span><span class="val">${fmtDate(o.pickupDate)}</span></div>
        <div class="detail-row"><span class="key">Final cost</span><span class="val">${fmtNaira(o.finalLaundryCost)}</span></div>
        ${o.laundryNote ? `<div class="notes-block"><div class="notes-label">Your note to admin</div>${escapeHtml(o.laundryNote)}</div>` : ''}
        <p style="font-size:13px; color:var(--brand-muted); margin:14px 0 0; text-align:center;">
          Customer has been billed and is yet to pay. You can keep working — mark ready when done.
        </p>
        <button class="ready-btn ready-btn-trigger" data-order-id="${escapeHtml(o.orderId)}">
          <span class="btn-label">Mark ready for delivery →</span>
        </button>
      </div>
    `;
  }

  function paidDetail(o) {
    return `
      <div class="order-detail">
        <div class="detail-row"><span class="key">Picked up</span><span class="val">${fmtDate(o.pickupDate)}</span></div>
        <div class="detail-row"><span class="key">Final cost</span><span class="val">${fmtNaira(o.finalLaundryCost)}</span></div>
        ${o.laundryNote ? `<div class="notes-block"><div class="notes-label">Your note to admin</div>${escapeHtml(o.laundryNote)}</div>` : ''}
        <p style="font-size:13px; color:var(--brand-success); margin:14px 0 0; text-align:center; font-weight:500;">
          Customer is fully paid. Mark ready as soon as the laundry is done.
        </p>
        <button class="ready-btn ready-btn-trigger" data-order-id="${escapeHtml(o.orderId)}">
          <span class="btn-label">Mark ready for delivery →</span>
        </button>
      </div>
    `;
  }

  function describeWhatWasOrdered(o) {
    const parts = [];
    if (o.loadEnabled) parts.push((o.loads || 1) + ' Load' + ((o.loads || 1) > 1 ? 's' : '') + ' (Wash + Fold)');
    if (o.careEnabled) parts.push('Care tab ' + fmtNaira(o.careTabPrepaid) + ' (Wash + Iron)');
    if (o.pickupOnly) parts.push('Pickup-only · estimate the cost');
    if (!parts.length) parts.push('Mixed laundry');
    return parts.join(' · ');
  }

  async function submitCost(orderId, form) {
    const finalCost = Number(form.elements.finalCost.value);
    const laundryNote = (form.elements.laundryNote.value || '').trim();
    if (!finalCost || isNaN(finalCost) || finalCost <= 0) {
      showToast('Enter a valid amount', 'error');
      return;
    }
    const btn = form.querySelector('.submit-btn');
    const lbl = btn.querySelector('.btn-label');
    btn.disabled = true; lbl.innerHTML = '<span class="spinner"></span> Sending';
    try {
      await callBackend('submitFinalCost', { orderId, finalCost, laundryNote });
      showToast('Sent to admin for review.', 'success');
      expandedId = null;
      await loadQueue();
    } catch (err) {
      btn.disabled = false; lbl.textContent = 'Send to admin for review';
      showToast(err.message || 'Save failed', 'error');
    }
  }

  async function markReady(orderId) {
    const btn = document.querySelector(`.ready-btn-trigger[data-order-id="${CSS.escape(orderId)}"]`);
    if (!btn) return;
    const lbl = btn.querySelector('.btn-label');
    btn.disabled = true; lbl.innerHTML = '<span class="spinner"></span> Marking';
    try {
      await callBackend('laundryMarkReady', { orderId });
      showToast('Customer notified. Admin will dispatch shortly.', 'success');
      expandedId = null;
      await loadQueue();
    } catch (err) {
      btn.disabled = false; lbl.textContent = 'Mark ready for delivery →';
      showToast(err.message || 'Failed', 'error');
    }
  }

  $('#refresh-btn').addEventListener('click', () => {
    $('#queue-wrap').innerHTML = '<div class="loading-state"><span class="spinner"></span> Refreshing…</div>';
    loadQueue();
  });

  let toastTimer;
  function showToast(text, kind) {
    const t = $('#toast');
    t.textContent = text;
    t.className = 'toast show ' + (kind || '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.classList.remove('show'); }, 3000);
  }

  if (passcode) {
    tryLogin(passcode).then(ok => {
      if (ok) showApp();
      else {
        passcode = '';
        sessionStorage.removeItem(STORAGE_KEY);
        showGate();
      }
    });
  } else {
    showGate();
  }
</script>

</body>
</html>
